<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jokempô</title>

<style>

*{
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, Helvetica, sans-serif;
}

body{
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #1e3a8a, #9333ea);
}

.container{
  background: white;
  padding: 30px;
  border-radius: 16px;
  width: 450px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

h1{
  color: #1e3a8a;
  margin-bottom: 10px;
}

.subtitle{
  color: gray;
  margin-bottom: 20px;
}

.rules{
  background: #f3f4f6;
  padding: 20px;
  border-radius: 10px;
  margin-bottom: 20px;
}

.opcoes{
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.btn{
  border: none;
  padding: 15px;
  border-radius: 30px;
  background: linear-gradient(135deg, #1e3a8a, #9333ea);
  color: white;
  font-size: 18px;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover{
  opacity: 0.9;
  transform: scale(1.03);
}

.resultado{
  margin-top: 20px;
  background: #f3f4f6;
  padding: 15px;
  border-radius: 10px;
  font-size: 18px;
  font-weight: bold;
}

</style>
</head>

<body>

<main class="container">

  <h1>Jokempô</h1>

  <p class="subtitle">Pedra, Papel e Tesoura</p>

  <section class="rules">
    <p>Escolha uma opção:</p>
  </section>

  <div class="opcoes">
    <button class="btn" onclick="jogar(1)">🪨 Pedra</button>
    <button class="btn" onclick="jogar(2)">📄 Papel</button>
    <button class="btn" onclick="jogar(3)">✂️ Tesoura</button>
  </div>

  <div id="resultado" class="resultado">
    Escolha uma opção para começar
  </div>

</main>

<script>

function jogar(user){

  const resultado = document.getElementById("resultado")

  const numero = Math.floor(Math.random() * 3) + 1

  let escolhaMaquina = ""

  if(numero === 1){
    escolhaMaquina = "🪨 Pedra"
  }else if(numero === 2){
    escolhaMaquina = "📄 Papel"
  }else{
    escolhaMaquina = "✂️ Tesoura"
  }

  if(user === numero){

    resultado.innerHTML =
      `🤝 Empate!<br>
       A máquina escolheu ${escolhaMaquina}`

  }else if(
    (user === 1 && numero === 2) ||
    (user === 2 && numero === 3) ||
    (user === 3 && numero === 1)
  ){

    resultado.innerHTML =
      `❌ Você perdeu!<br>
       A máquina escolheu ${escolhaMaquina}`

  }else{

    resultado.innerHTML =
      `🎉 Você ganhou!<br>
       A máquina escolheu ${escolhaMaquina}`

  }

}

</script>

</body>
</html>
